<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Same 135° gradient as .site-logo-icon in CSS -->
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>

  <!-- top-left finder pattern -->
  <rect x="2" y="2" width="10" height="10" rx="2" fill="white"/>
  <rect x="4" y="4" width="6"  height="6"  rx="1" fill="url(#g)"/>

  <!-- top-right finder pattern -->
  <rect x="20" y="2" width="10" height="10" rx="2" fill="white"/>
  <rect x="22" y="4" width="6"  height="6"  rx="1" fill="url(#g)"/>

  <!-- bottom-left finder pattern -->
  <rect x="2" y="20" width="10" height="10" rx="2" fill="white"/>
  <rect x="4" y="22" width="6"  height="6"  rx="1" fill="url(#g)"/>

  <!-- data dots (bottom-right quadrant) -->
  <rect x="20" y="20" width="4" height="4" rx="1" fill="white"/>
  <rect x="26" y="20" width="4" height="4" rx="1" fill="white"/>
  <rect x="20" y="26" width="4" height="4" rx="1" fill="white"/>
  <rect x="26" y="26" width="4" height="4" rx="1" fill="white"/>
</svg>
